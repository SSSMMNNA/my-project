<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7073636277654421"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>{{TITLE}} | usetool.net</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="canonical" href="https://usetool.net/blog/{{SLUG}}">

  <!-- OGP -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}} | usetool.net">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="https://usetool.net/blog/{{SLUG}}">
  <meta property="og:site_name" content="usetool.net">
  <meta property="og:locale" content="ja_JP">
  <meta property="article:published_time" content="{{DATE_ISO}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{TITLE}} | usetool.net">
  <meta name="twitter:description" content="{{DESCRIPTION}}">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ── Site Nav ─────────────────────────── */
    .site-nav {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .site-nav a {
      font-size: 0.85rem;
      color: #6e6e73;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.15s, color 0.15s;
    }

    .site-nav a:hover {
      background: #e5e5ea;
      color: #1d1d1f;
    }

    .site-nav a.active {
      background: #0071e3;
      color: #fff;
      font-weight: 600;
    }

    /* ── Breadcrumb ───────────────────────── */
    .breadcrumb {
      font-size: 0.8rem;
      color: #8e8e93;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .breadcrumb a {
      color: #8e8e93;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: #0071e3;
      text-decoration: none;
    }

    .breadcrumb-sep {
      color: #c7c7cc;
    }

    /* ── Article Card ─────────────────────── */
    .article-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
    }

    /* ── Article Header ───────────────────── */
    .article-header {
      margin-bottom: 24px;
    }

    .article-meta {
      font-size: 0.8rem;
      color: #8e8e93;
      margin-bottom: 12px;
    }

    .article-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.35;
      color: #1d1d1f;
    }

    /* ── Ad Unit ──────────────────────────── */
    .ad-unit {
      background: #f5f5f7;
      border-radius: 10px;
      padding: 8px;
      margin: 24px 0;
      text-align: center;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ad-label {
      display: block;
      font-size: 0.68rem;
      color: #aeaeb2;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .ad-wrap {
      width: 100%;
    }

    /* ── Article Body ─────────────────────── */
    .article-body {
      font-size: 0.95rem;
      line-height: 1.85;
      color: #3a3a3c;
    }

    .article-body h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1d1d1f;
      margin: 32px 0 12px;
      padding-left: 12px;
      border-left: 3px solid #0071e3;
    }

    .article-body h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1d1d1f;
      margin: 24px 0 8px;
    }

    .article-body p {
      margin-bottom: 16px;
    }

    .article-body ul,
    .article-body ol {
      margin: 12px 0 16px 1.5em;
    }

    .article-body li {
      margin-bottom: 6px;
    }

    .article-body strong {
      font-weight: 600;
      color: #1d1d1f;
    }

    .article-body code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85em;
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 4px;
      color: #3a3a3c;
    }

    .article-body pre {
      background: #1d1d1f;
      color: #f5f5f7;
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      margin: 16px 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .article-body pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .article-body blockquote {
      border-left: 3px solid #c7c7cc;
      padding-left: 16px;
      margin: 16px 0;
      color: #6e6e73;
      font-style: italic;
    }

    .article-body img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin: 16px 0;
    }

    .article-body a {
      color: #0071e3;
    }

    /* ── Related Tools ────────────────────── */
    .related-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 32px;
      margin-bottom: 20px;
    }

    .related-card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 16px;
    }

    .related-tools {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #f5f5f7;
      border-radius: 10px;
      text-decoration: none;
      color: #1d1d1f;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .tool-link:hover {
      background: #e5e5ea;
      text-decoration: none;
    }

    .tool-link-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .tool-link-desc {
      font-size: 0.78rem;
      color: #6e6e73;
      font-weight: 400;
      margin-top: 2px;
    }

    /* ── Footer ───────────────────────────── */
    footer {
      text-align: center;
      padding-top: 16px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .footer-links a {
      font-size: 0.8rem;
      color: #8e8e93;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #0071e3;
      text-decoration: none;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: #aeaeb2;
    }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 640px) {
      .article-card,
      .related-card {
        padding: 24px 20px;
      }

      .article-title {
        font-size: 1.3rem;
      }

      .article-body h2 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- サイトナビゲーション -->
    <nav class="site-nav">
      <a href="/">画像・PDF圧縮</a>
      <a href="/webp/">WebP変換</a>
      <a href="/contact.html">お問い合わせ</a>
    </nav>

    <!-- パンくずリスト -->
    <nav class="breadcrumb" aria-label="パンくずリスト">
      <a href="/">ホーム</a>
      <span class="breadcrumb-sep">›</span>
      <a href="/blog/">ブログ</a>
      <span class="breadcrumb-sep">›</span>
      <span>{{TITLE}}</span>
    </nav>

    <!-- 記事カード -->
    <article class="article-card">

      <!-- 記事ヘッダー -->
      <header class="article-header">
        <p class="article-meta">
          <time datetime="{{DATE_ISO}}">{{DATE}}</time>
        </p>
        <h1 class="article-title">{{TITLE}}</h1>
      </header>

      <!-- 広告：記事上部 -->
      <div class="ad-wrap">
        <span class="ad-label">広告</span>
        <div class="ad-unit">
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-7073636277654421"
               data-ad-slot="XXXXXXXXXX"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
      </div>

      <!-- 記事本文（前半） -->
      <div class="article-body">
        {{CONTENT_TOP}}
      </div>

      <!-- 広告：記事中部 -->
      <div class="ad-wrap">
        <span class="ad-label">広告</span>
        <div class="ad-unit">
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-7073636277654421"
               data-ad-slot="XXXXXXXXXX"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
      </div>

      <!-- 記事本文（後半） -->
      <div class="article-body">
        {{CONTENT_BOTTOM}}
      </div>

      <!-- 広告：記事下部 -->
      <div class="ad-wrap">
        <span class="ad-label">広告</span>
        <div class="ad-unit">
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-7073636277654421"
               data-ad-slot="XXXXXXXXXX"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
      </div>

    </article>

    <!-- 関連ツール -->
    <aside class="related-card">
      <h2>関連ツール</h2>
      <div class="related-tools">
        {{RELATED_TOOLS}}
        <!-- 使用例（置換後はこの形式で展開）:
        <a href="/" class="tool-link">
          <span class="tool-link-icon">🗜️</span>
          <div>
            <div>画像・PDF圧縮ツール</div>
            <div class="tool-link-desc">JPEG・PNG・PDFをブラウザ上で圧縮</div>
          </div>
        </a>
        <a href="/webp/" class="tool-link">
          <span class="tool-link-icon">🖼️</span>
          <div>
            <div>WebP変換ツール</div>
            <div class="tool-link-desc">画像をWebP形式に一括変換</div>
          </div>
        </a>
        -->
      </div>
    </aside>

    <!-- フッター -->
    <footer>
      <nav class="footer-links">
        <a href="/">ホーム</a>
        <a href="/blog/">ブログ</a>
        <a href="/privacy.html">プライバシーポリシー</a>
        <a href="/contact.html">お問い合わせ</a>
      </nav>
      <p class="footer-copy">&copy; 2024 usetool.net</p>
    </footer>

  </div>
</body>
</html>
