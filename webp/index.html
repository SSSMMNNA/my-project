<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7073636277654421"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebP変換ツール | usetool.net</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    [hidden] {
      display: none !important;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #6e6e73;
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* ── Upload Area ──────────────────────── */
    .upload-area {
      border: 2px dashed #c7c7cc;
      border-radius: 16px;
      background: #fff;
      padding: 60px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-area:hover,
    .upload-area.drag-over {
      border-color: #0071e3;
      background: #f0f6ff;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .upload-text {
      font-size: 1.05rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .upload-sub {
      color: #6e6e73;
      font-size: 0.85rem;
    }

    /* ── Privacy Note ─────────────────────── */
    .privacy-note {
      text-align: center;
      font-size: 0.78rem;
      color: #8e8e93;
      margin-top: 12px;
      line-height: 1.6;
    }

    /* ── Settings Bar ─────────────────────── */
    .settings-bar {
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .settings-bar label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #3a3a3c;
      white-space: nowrap;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 200px;
    }

    #qualitySlider {
      flex: 1;
      accent-color: #0071e3;
    }

    .quality-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #0071e3;
      min-width: 40px;
      text-align: right;
    }

    .btn-convert-all {
      padding: 10px 24px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-convert-all:hover {
      background: #0077ed;
    }

    .btn-convert-all:active {
      background: #005cbf;
    }

    .btn-convert-all:disabled {
      background: #aeaeb2;
      cursor: not-allowed;
    }

    /* ── File List ────────────────────────── */
    .file-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 16px;
    }

    .file-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      background: #f5f5f7;
      display: block;
    }

    .file-thumb-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .file-info {
      min-width: 0;
    }

    .file-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #1d1d1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .file-meta {
      font-size: 0.78rem;
      color: #6e6e73;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .file-meta span {
      background: #f5f5f7;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .size-arrow {
      color: #c7c7cc;
      font-size: 0.8rem;
    }

    .reduction-badge {
      background: #d1fae5 !important;
      color: #065f46 !important;
      font-weight: 600;
    }

    .file-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .status-badge.pending {
      background: #f5f5f7;
      color: #8e8e93;
    }

    .status-badge.converting {
      background: #fff8e1;
      color: #92400e;
    }

    .status-badge.done {
      background: #d1fae5;
      color: #065f46;
    }

    .btn-download {
      padding: 7px 16px;
      background: #34c759;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-download:hover {
      background: #30b350;
    }

    /* ── Download All ─────────────────────── */
    .download-all-area {
      margin-top: 20px;
      text-align: center;
    }

    .btn-download-all {
      padding: 14px 48px;
      background: #34c759;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-download-all:hover {
      background: #30b350;
    }

    .hint {
      font-size: 0.78rem;
      color: #8e8e93;
      margin-top: 8px;
    }

    /* ── Site Nav ─────────────────────────── */
    .site-nav {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .site-nav a {
      font-size: 0.85rem;
      color: #6e6e73;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.15s, color 0.15s;
    }

    .site-nav a:hover {
      background: #e5e5ea;
      color: #1d1d1f;
    }

    .site-nav a.active {
      background: #0071e3;
      color: #fff;
      font-weight: 600;
    }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 640px) {
      header h1 {
        font-size: 1.6rem;
      }

      .settings-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-convert-all {
        width: 100%;
      }

      .file-card {
        grid-template-columns: 52px 1fr;
        grid-template-rows: auto auto;
      }

      .file-thumb,
      .file-thumb-placeholder {
        width: 52px;
        height: 52px;
      }

      .file-actions {
        grid-column: 1 / -1;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <nav class="site-nav">
      <a href="/">画像・PDF圧縮</a>
      <a href="/webp/" class="active">WebP変換</a>
      <a href="/contact.html">お問い合わせ</a>
    </nav>

    <header>
      <h1>WebP変換ツール</h1>
      <p class="subtitle">JPEG・PNG・GIF を WebP に一括変換</p>
    </header>

    <!-- アップロード領域 -->
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">🖼️</div>
      <p class="upload-text">ドラッグ＆ドロップ または クリックして選択</p>
      <p class="upload-sub">JPEG・PNG・GIF 対応 / 複数ファイル同時選択可</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif" multiple hidden>
    </div>

    <p class="privacy-note">🔒 アップロードされたファイルはすべてお使いのブラウザ上で処理されます。ファイルはサーバーに送信されず、外部に漏れることは一切ありません。</p>

    <!-- 設定バー -->
    <div class="settings-bar" id="settingsBar" hidden>
      <label>品質</label>
      <div class="slider-wrap">
        <input type="range" id="qualitySlider" min="0" max="100" value="85">
        <span class="quality-value"><span id="qualityValue">85</span>%</span>
      </div>
      <button class="btn-convert-all" id="convertAllBtn">すべて変換</button>
    </div>

    <!-- ファイル一覧 -->
    <div class="file-list" id="fileList"></div>

    <!-- 一括ダウンロード -->
    <div class="download-all-area" id="downloadAllArea" hidden>
      <button class="btn-download-all" id="downloadAllBtn">すべてダウンロード</button>
      <p class="hint">各ファイルを個別にダウンロードします</p>
    </div>

  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const settingsBar = document.getElementById('settingsBar');
    const fileList = document.getElementById('fileList');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityValue = document.getElementById('qualityValue');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const downloadAllArea = document.getElementById('downloadAllArea');
    const downloadAllBtn = document.getElementById('downloadAllBtn');

    // ファイルデータ管理
    const files = []; // { file, objectUrl, resultBlob, resultUrl, card }

    // 品質スライダー
    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = qualitySlider.value;
    });

    // アップロードエリア クリック
    uploadArea.addEventListener('click', () => fileInput.click());

    // ドラッグ＆ドロップ
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('drag-over');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(fileObjs) {
      const accepted = ['image/jpeg', 'image/png', 'image/gif'];
      const newFiles = Array.from(fileObjs).filter(f => accepted.includes(f.type));
      if (newFiles.length === 0) return;

      newFiles.forEach(file => {
        const entry = { file, objectUrl: URL.createObjectURL(file), resultBlob: null, resultUrl: null, card: null };
        files.push(entry);
        entry.card = createCard(entry);
        fileList.appendChild(entry.card);
      });

      settingsBar.removeAttribute('hidden');
      downloadAllArea.setAttribute('hidden', '');
      fileInput.value = '';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function createCard(entry) {
      const card = document.createElement('div');
      card.className = 'file-card';

      // サムネイル
      const thumb = document.createElement('img');
      thumb.className = 'file-thumb';
      thumb.src = entry.objectUrl;
      thumb.alt = entry.file.name;

      // 情報
      const info = document.createElement('div');
      info.className = 'file-info';

      const name = document.createElement('div');
      name.className = 'file-name';
      name.textContent = entry.file.name;

      const meta = document.createElement('div');
      meta.className = 'file-meta';

      const origSize = document.createElement('span');
      origSize.textContent = formatSize(entry.file.size);

      const ext = document.createElement('span');
      ext.textContent = entry.file.type.split('/')[1].toUpperCase();

      meta.appendChild(origSize);
      meta.appendChild(ext);

      info.appendChild(name);
      info.appendChild(meta);

      // アクション
      const actions = document.createElement('div');
      actions.className = 'file-actions';

      const status = document.createElement('span');
      status.className = 'status-badge pending';
      status.textContent = '未変換';

      actions.appendChild(status);

      card.appendChild(thumb);
      card.appendChild(info);
      card.appendChild(actions);

      entry._meta = meta;
      entry._origSize = origSize;
      entry._status = status;
      entry._actions = actions;

      return card;
    }

    // 1ファイル変換
    async function convertFile(entry) {
      const quality = parseInt(qualitySlider.value) / 100;

      entry._status.className = 'status-badge converting';
      entry._status.textContent = '変換中…';

      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          canvas.toBlob((blob) => {
            entry.resultBlob = blob;
            if (entry.resultUrl) URL.revokeObjectURL(entry.resultUrl);
            entry.resultUrl = URL.createObjectURL(blob);

            // メタ情報更新
            const arrow = document.createElement('span');
            arrow.className = 'size-arrow';
            arrow.textContent = '→';

            const newSize = document.createElement('span');
            newSize.textContent = formatSize(blob.size);

            const rate = Math.round((1 - blob.size / entry.file.size) * 100);
            const badge = document.createElement('span');
            if (rate > 0) {
              badge.className = 'reduction-badge';
              badge.textContent = `-${rate}%`;
            } else {
              badge.textContent = `+${Math.abs(rate)}%`;
            }

            entry._meta.innerHTML = '';
            entry._meta.appendChild(entry._origSize);
            entry._meta.appendChild(arrow);
            entry._meta.appendChild(newSize);
            entry._meta.appendChild(badge);

            // ステータス
            entry._status.className = 'status-badge done';
            entry._status.textContent = '変換済み';

            // ダウンロードボタン
            let dlBtn = entry._actions.querySelector('.btn-download');
            if (!dlBtn) {
              dlBtn = document.createElement('button');
              dlBtn.className = 'btn-download';
              dlBtn.textContent = 'ダウンロード';
              entry._actions.appendChild(dlBtn);
            }
            dlBtn.onclick = () => {
              const a = document.createElement('a');
              a.href = entry.resultUrl;
              a.download = entry.file.name.replace(/\.[^.]+$/, '') + '.webp';
              a.click();
            };

            resolve();
          }, 'image/webp', quality);
        };
        img.src = entry.objectUrl;
      });
    }

    // すべて変換
    convertAllBtn.addEventListener('click', async () => {
      convertAllBtn.disabled = true;
      convertAllBtn.textContent = '変換中…';

      for (const entry of files) {
        await convertFile(entry);
      }

      convertAllBtn.disabled = false;
      convertAllBtn.textContent = 'すべて変換';
      downloadAllArea.removeAttribute('hidden');
    });

    // すべてダウンロード
    downloadAllBtn.addEventListener('click', () => {
      files.forEach(entry => {
        if (!entry.resultUrl) return;
        const a = document.createElement('a');
        a.href = entry.resultUrl;
        a.download = entry.file.name.replace(/\.[^.]+$/, '') + '.webp';
        a.click();
      });
    });
  </script>
</body>
</html>
