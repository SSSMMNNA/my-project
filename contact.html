<!DOCTYPE html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7073636277654421"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | usetool.net</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #6e6e73;
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .site-name {
      display: inline-block;
      color: #0071e3;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
    }

    .card p {
      font-size: 0.9rem;
      color: #3a3a3c;
      line-height: 1.75;
      margin-bottom: 24px;
    }

    .form-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      background: #f5f5f7;
    }

    .form-wrap iframe {
      display: block;
      width: 100%;
      height: 680px;
      border: none;
    }

    .note {
      font-size: 0.8rem;
      color: #8e8e93;
      margin-top: 16px;
      margin-bottom: 0 !important;
      text-align: center;
    }

    a {
      color: #0071e3;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.88rem;
      color: #0071e3;
    }

    /* ── Site Nav ─────────────────────────── */
    .site-nav {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .site-nav a {
      font-size: 0.85rem;
      color: #6e6e73;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.15s, color 0.15s;
    }

    .site-nav a:hover {
      background: #e5e5ea;
      color: #1d1d1f;
    }

    .site-nav a.active {
      background: #0071e3;
      color: #fff;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px 20px;
      }

      .form-wrap iframe {
        height: 760px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <nav class="site-nav">
      <a href="/">画像・PDF圧縮</a>
      <a href="/webp/">WebP変換</a>
      <a href="/contact.html" class="active">お問い合わせ</a>
    </nav>

    <header>
      <span class="site-name">usetool.net</span>
      <h1>お問い合わせ</h1>
      <p class="subtitle">ご意見・ご要望・不具合報告などはこちらから</p>
    </header>

    <div class="card">
      <p>バグ報告、機能のご要望、その他お気づきの点がございましたら、以下のフォームよりお気軽にご連絡ください。内容を確認の上、必要に応じてご返信いたします。</p>

      <!-- Google フォーム埋め込み（URLは後で差し替えてください） -->
      <div class="form-wrap">
        <iframe
          src="https://docs.google.com/forms/d/e/DUMMY_FORM_ID/viewform?embedded=true"
          title="お問い合わせフォーム"
          loading="lazy">
          フォームを読み込んでいます...
        </iframe>
      </div>

      <p class="note">フォームが表示されない場合は、ページを再読み込みしてください。</p>
    </div>

    <a href="index.html" class="nav-link">← ツールに戻る</a>

  </div>
</body>
</html>
